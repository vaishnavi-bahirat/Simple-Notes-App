name: CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend
        working-directory: ./Backend
        run: npm install

      - name: Install React
        working-directory: ./Backend
        run: npm install
